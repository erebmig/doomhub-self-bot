<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoomHub Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glow { box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(239, 68, 68, 0.3); }
        .input-focus:focus { box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.3); }
        .progress-bar { transition: width 0.5s ease; }
    </style>
</head>
<body class="gradient-bg text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8 pb-4 border-b border-gray-800">
            <div>
                <h1 class="text-5xl font-bold bg-gradient-to-r from-red-500 to-red-700 bg-clip-text text-transparent">
                    DoomHub
                </h1>
                <p class="text-gray-400 mt-2 text-lg">Advanced Discord Automation Suite</p>
            </div>
            <div class="flex items-center space-x-3">
                <div class="flex items-center space-x-2">
                    <div class="h-3 w-3 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-sm text-gray-400">System Online</span>
                </div>
                <div class="h-8 w-px bg-gray-700"></div>
                <div class="text-sm text-gray-400">
                    <span id="currentTime"></span>
                </div>
            </div>
        </div>
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gray-800/40 backdrop-blur rounded-lg p-5 border border-gray-700 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-gray-400 mb-1">Active Proxies</div>
                        <div class="text-3xl font-bold text-red-500" id="proxyCount">-</div>
                    </div>
                    <div class="h-12 w-12 bg-red-500/10 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="bg-gray-800/40 backdrop-blur rounded-lg p-5 border border-gray-700 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-gray-400 mb-1">Active Tasks</div>
                        <div class="text-3xl font-bold text-red-500" id="taskCount">-</div>
                    </div>
                    <div class="h-12 w-12 bg-red-500/10 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="bg-gray-800/40 backdrop-blur rounded-lg p-5 border border-gray-700 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-gray-400 mb-1">Messages Sent</div>
                        <div class="text-3xl font-bold text-red-500" id="msgCount">-</div>
                    </div>
                    <div class="h-12 w-12 bg-red-500/10 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Token Validator -->
            <div class="bg-gray-800/30 backdrop-blur rounded-lg p-6 border border-gray-700 glow card-hover">
                <h2 class="text-xl font-semibold mb-4 text-red-400 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    Token Validator
                </h2>
                <textarea id="token" 
                          class="w-full bg-gray-900/50 border border-gray-700 rounded-lg p-3 mb-3 text-sm input-focus focus:outline-none" 
                          placeholder="Enter Discord token..." rows="3"></textarea>
                <button onclick="validateToken()" 
                        class="bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 px-6 py-2 rounded-lg font-medium transition-all">
                    Validate Token
                </button>
                <div id="tokenResult" class="mt-4 text-sm"></div>
            </div>
            
            <!-- Kamp Spammer -->
            <div class="bg-gray-800/30 backdrop-blur rounded-lg p-6 border border-gray-700 glow card-hover">
                <h2 class="text-xl font-semibold mb-4 text-red-400 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Kamp Spammer
                </h2>
                <input type="text" id="kampToken" placeholder="Discord Token" 
                       class="w-full bg-gray-900/50 border border-gray-700 rounded-lg p-3 mb-3 text-sm input-focus focus:outline-none">
                <input type="text" id="channelId" placeholder="Channel ID" 
                       class="w-full bg-gray-900/50 border border-gray-700 rounded-lg p-3 mb-3 text-sm input-focus focus:outline-none">
                <textarea id="message" placeholder="Message to spam" rows="2"
                          class="w-full bg-gray-900/50 border border-gray-700 rounded-lg p-3 mb-3 text-sm input-focus focus:outline-none"></textarea>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="text-xs text-gray-400 mb-1 block">Count (max 100)</label>
                        <input type="number" id="count" value="10" min="1" max="100"
                               class="w-full bg-gray-900/50 border border-gray-700 rounded-lg p-3 text-sm input-focus focus:outline-none">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 mb-1 block">Delay (seconds)</label>
                        <input type="number" id="delay" value="2" min="1" step="0.5"
                               class="w-full bg-gray-900/50 border border-gray-700 rounded-lg p-3 text-sm input-focus focus:outline-none">
                    </div>
                </div>
                <div class="flex space-x-3">
                    <button onclick="startKamp()" 
                            class="bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 px-6 py-2 rounded-lg font-medium transition-all flex-1">
                        Start Kamp
                    </button>
                    <button onclick="stopKamp()" 
                            class="bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded-lg font-medium transition-all">
                        Stop
                    </button>
                </div>
                <div id="kampResult" class="mt-4 text-sm"></div>
            </div>
        </div>
        
        <!-- Footer -->
        <footer class="mt-8 text-center text-gray-600 text-sm py-4 border-t border-gray-800">
            © 2026 DoomHub and Tader - All Rights Reserved
        </footer>
    </div>
    
    <script>
        let currentTaskId = null;
        let statusInterval = null;
        let totalMessagesSent = 0;
        
        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString();
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        // Update stats
        async function updateStats() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                document.getElementById('proxyCount').textContent = data.proxies || 0;
                document.getElementById('taskCount').textContent = data.active_tasks || 0;
            } catch(e) {
                console.error('Failed to fetch stats:', e);
            }
        }
        
        // Token validation
        async function validateToken() {
            const token = document.getElementById('token').value.trim();
            const resultDiv = document.getElementById('tokenResult');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="bg-yellow-900/30 border border-yellow-700 rounded-lg p-3 text-yellow-400">⚠ Please enter a token</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="flex items-center space-x-2 text-yellow-500"><div class="animate-spin rounded-full h-4 w-4 border-2 border-yellow-500 border-t-transparent"></div><span>Validating...</span></div>';
            
            try {
                const response = await fetch('/api/validate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token})
                });
                const data = await response.json();
                
                if (data.valid) {
                    resultDiv.innerHTML = `<div class="bg-green-900/30 border border-green-700 rounded-lg p-3">
                        <div class="flex items-center text-green-400 mb-1">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            Valid Token
                        </div>
                        <span class="text-sm text-gray-400">${data.username}</span>
                    </div>`;
                } else {
                    resultDiv.innerHTML = `<div class="bg-red-900/30 border border-red-700 rounded-lg p-3">
                        <div class="flex items-center text-red-400">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            ${data.message}
                        </div>
                    </div>`;
                }
            } catch (e) {
                resultDiv.innerHTML = '<div class="bg-red-900/30 border border-red-700 rounded-lg p-3 text-red-400">✗ Connection Error</div>';
            }
        }
        
        // Start kamp
        async function startKamp() {
            const token = document.getElementById('kampToken').value.trim();
            const channelId = document.getElementById('channelId').value.trim();
            const message = document.getElementById('message').value.trim();
            const count = parseInt(document.getElementById('count').value);
            const delay = parseFloat(document.getElementById('delay').value);
            
            if (!token || !channelId || !message) {
                document.getElementById('kampResult').innerHTML = '<div class="bg-yellow-900/30 border border-yellow-700 rounded-lg p-3 text-yellow-400">⚠ All fields are required</div>';
                return;
            }
            
            const resultDiv = document.getElementById('kampResult');
            resultDiv.innerHTML = '<div class="flex items-center space-x-2 text-yellow-500"><div class="animate-spin rounded-full h-4 w-4 border-2 border-yellow-500 border-t-transparent"></div><span>Starting Kamp...</span></div>';
            
            try {
                const response = await fetch('/api/kamp/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token, channelId, message, count, delay})
                });
                const data = await response.json();
                
                if (data.success) {
                    currentTaskId = data.taskId;
                    resultDiv.innerHTML = `<div class="bg-green-900/30 border border-green-700 rounded-lg p-3">
                        <div class="flex items-center text-green-400">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            Kamp Started Successfully
                        </div>
                    </div>`;
                    if (statusInterval) clearInterval(statusInterval);
                    statusInterval = setInterval(pollKampStatus, 1000);
                    updateStats();
                } else {
                    resultDiv.innerHTML = `<div class="bg-red-900/30 border border-red-700 rounded-lg p-3 text-red-400">✗ ${data.message}</div>`;
                }
            } catch (e) {
                resultDiv.innerHTML = '<div class="bg-red-900/30 border border-red-700 rounded-lg p-3 text-red-400">✗ Error starting kamp</div>';
            }
        }
        
        // Stop kamp
        async function stopKamp() {
            if (!currentTaskId) return;
            
            try {
                await fetch('/api/kamp/stop', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({taskId: currentTaskId})
                });
                document.getElementById('kampResult').innerHTML = '<div class="bg-yellow-900/30 border border-yellow-700 rounded-lg p-3 text-yellow-400">⏸ Kamp Stopped</div>';
                if (statusInterval) {
                    clearInterval(statusInterval);
                    statusInterval = null;
                }
                currentTaskId = null;
                updateStats();
            } catch (e) {
                console.error('Failed to stop kamp:', e);
            }
        }
        
        // Poll kamp status
        async function pollKampStatus() {
            if (!currentTaskId) {
                if (statusInterval) clearInterval(statusInterval);
                return;
            }
            
            try {
                const response = await fetch(`/api/kamp/status/${currentTaskId}`);
                const data = await response.json();
                
                if (data.running) {
                    const percent = Math.round((data.sent / data.total) * 100);
                    document.getElementById('kampResult').innerHTML = `<div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3">
                        <div class="flex justify-between mb-2">
                            <span class="text-blue-400">📊 Progress: ${data.sent}/${data.total}</span>
                            <span class="text-blue-400 font-bold">${percent}%</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2.5">
                            <div class="bg-gradient-to-r from-blue-500 to-blue-600 h-2.5 rounded-full progress-bar" style="width: ${percent}%"></div>
                        </div>
                        <div class="flex justify-between mt-2 text-xs text-gray-400">
                            <span>Sent: ${data.sent}</span>
                            <span>Failed: ${data.failed}</span>
                        </div>
                    </div>`;
                    document.getElementById('msgCount').textContent = data.sent;
                    totalMessagesSent = data.sent;
                    updateStats();
                } else {
